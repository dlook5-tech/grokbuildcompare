<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grokbuildcompare — Grok-Build X-Native Curation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #c9a67a; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: #f7f2ea; color: #1c1410; padding: 20px 32px 0; border-bottom: 3px solid #d4b896; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
  .logo { font-family: "Playfair Display", Georgia, serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; color: #1c1410; }
  .logo small { font-family: "Inter", sans-serif; font-size: 0.6rem; letter-spacing: 2.5px; text-transform: uppercase; color: #b8860b; font-weight: 600; display: block; margin-top: 4px; }
  .tagline { font-size: 0.65rem; letter-spacing: 2.5px; text-transform: uppercase; color: #8a7e72; margin-bottom: 14px; font-weight: 500; }
  .date { font-size: 0.8rem; color: #6b5d4f; font-weight: 500; }
  .freshness-badge { display: inline-block; margin-left: 12px; padding: 4px 10px; background: #ede8e0; color: #6b5d4f; font-size: 0.7rem; font-weight: 600; border-radius: 12px; cursor: pointer; user-select: none; border: 1px solid #d4b896; }
  .freshness-badge:hover { background: #e0d8cb; color: #1c1410; }
  nav { display: flex; gap: 4px; margin-top: 14px; border-top: 1px solid #e5dcc8; padding-top: 8px; }
  nav a { color: #8a7e72; text-decoration: none; padding: 9px 14px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
  nav a:hover { color: #3a2a18; }
  nav a.active { color: #b8860b; border-bottom: 2px solid #b8860b; font-weight: 700; }
  main { flex: 1; padding: 24px 32px; max-width: 920px; margin: 0 auto; width: 100%; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: #f0e6d6; margin-bottom: 6px; font-weight: 600; }
  h1 { font-family: "Playfair Display", Georgia, serif; font-size: 1.85rem; font-weight: 800; margin-bottom: 6px; line-height: 1.2; color: #fff8ee; text-shadow: 0 1px 3px rgba(80,40,0,0.3); }
  .subtitle { color: #f0e6d6; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
  .subtitle .label-conservative { color: #c45a4a; font-weight: 700; }
  .subtitle .label-independent { color: #ffffff; font-weight: 700; }
  .subtitle .label-democrat { color: #3d80c2; font-weight: 700; }

  /* Story block */
  .story { border: 1px solid #d4b896; border-radius: 6px; margin-bottom: 12px; background: #faf6f0; overflow: hidden; box-shadow: 0 2px 8px rgba(80,50,20,0.15); }
  .story-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; font-weight: 600; color: #1a1a1a; transition: background 0.15s; }
  .story-header:hover { background: #f4ede0; }
  .arrow { color: #b8860b; font-size: 0.85rem; flex-shrink: 0; transition: transform 0.2s; margin-top: 2px; }
  .story.open > .story-header .arrow { transform: rotate(90deg); }
  .story-headline-text { flex: 1; line-height: 1.35; font-size: 0.98rem; }
  .post-meta { font-size: 0.7rem; color: #8a7e72; font-weight: 500; margin-top: 4px; display: block; }
  .post-meta .views { color: #b8860b; font-weight: 700; }

  .story-body { display: none; padding: 0 18px 18px 40px; border-top: 1px solid #ede4cf; padding-top: 16px; }
  .story.open > .story-body { display: block; }

  /* Perspective */
  .perspective { border-left: 3px solid; padding: 12px 14px; margin-bottom: 12px; border-radius: 4px; font-size: 0.88rem; line-height: 1.55; }
  .perspective-conservative { background: #fbe9e9; border-color: #c45a4a; }
  .perspective-independent { background: #f5f0e7; border-color: #b8860b; }
  .perspective-democrat   { background: #e7f0fa; border-color: #3d80c2; }
  .persp-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .persp-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
  .label-cons { color: #a63d2f; }
  .label-ind  { color: #8b6e1e; }
  .label-dem  { color: #2b6ea3; }
  .persp-meta { font-size: 0.7rem; color: #6b5d4f; font-weight: 500; }
  .persp-body { color: #2a2218; margin-bottom: 10px; white-space: pre-wrap; word-wrap: break-word; }
  .persp-handle { font-size: 0.78rem; color: #6b5d4f; }
  .persp-handle a { color: #2980b9; text-decoration: none; font-weight: 600; }
  .persp-handle a:hover { text-decoration: underline; }

  /* Honesty */
  .honesty-card { margin-top: 10px; padding: 9px 12px; background: rgba(255,255,255,0.55); border: 1px solid rgba(0,0,0,0.08); border-radius: 5px; }
  .honesty-line { font-size: 0.75rem; color: #4a3a25; font-weight: 600; }
  .honesty-score { font-size: 1rem; font-weight: 900; padding: 1px 8px; border-radius: 10px; margin-left: 4px; }
  .h-good  { background: #c6e6c8; color: #1f5a23; }
  .h-mid   { background: #f5e3b6; color: #6e5018; }
  .h-poor  { background: #f5c8c2; color: #7a2a20; }
  .honesty-notes { font-size: 0.76rem; color: #5a4a30; line-height: 1.45; margin-top: 6px; }

  footer { background: #1c1410; color: #d4b896; padding: 18px 32px; text-align: center; font-size: 0.75rem; }
  footer strong { color: #f0e6d6; }
  .empty-msg { color: #f0e6d6; font-size: 0.9rem; margin-top: 20px; }
  .build-tag { display: inline-block; margin-left: 8px; padding: 2px 8px; background: #b8860b; color: #fff; font-size: 0.55rem; font-weight: 700; letter-spacing: 1px; border-radius: 8px; vertical-align: middle; }

  @media (max-width: 600px) {
    header { padding: 16px 18px 0; }
    main { padding: 18px 16px; }
    .logo { font-size: 1.7rem; }
    h1 { font-size: 1.4rem; }
    .story-body { padding-left: 16px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <div class="logo">grokbuildcompare<span class="build-tag">Grok-Build</span></div>
      <div class="tagline">X-NATIVE CURATION · &lt; 24H · 3 PERSPECTIVES + HONESTY</div>
    </div>
    <div style="text-align:right;">
      <span class="date" id="currentDate"></span>
      <span class="freshness-badge" id="freshnessBadge" onclick="hardRefresh()" title="Tap to fetch the latest stories now">checking…</span>
    </div>
  </div>
  <nav id="nav">
    <a data-tab="world" class="active">World</a>
    <a data-tab="usa">USA</a>
  </nav>
</header>
<main id="content"><div class="empty-msg">Loading stories…</div></main>
<footer>&copy; 2026 <strong>grokbuildcompare</strong> · Companion to eXpressO News for A/B curation comparison</footer>

<script>
var NEWS_DATA = null;
var activeTab = 'world';

function formatDate() {
  var d = new Date(), days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"], months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
}
function todayLabel() {
  var d = new Date(), months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  return months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
}
function timeAgo(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  var diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}
function honestyClass(h) {
  if (h >= 8) return 'h-good';
  if (h >= 6.5) return 'h-mid';
  return 'h-poor';
}
function esc(s) {
  return (s || '').replace(/[&<>"]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});
}
function labelClass(label) {
  if (label === 'Conservative') return 'label-cons';
  if (label === 'Democrat') return 'label-dem';
  return 'label-ind';
}
function persClass(label) {
  if (label === 'Conservative') return 'perspective-conservative';
  if (label === 'Democrat') return 'perspective-democrat';
  return 'perspective-independent';
}

function renderPerspective(p) {
  if (!p) return '';
  var handle = esc(p.handle || '@?');
  var url = p.url || '#';
  var body = esc(p.body || '').replace(/\n/g, '<br/>');
  var ago = timeAgo(p.posted);
  var views = esc(p.views || '');
  var honesty = (typeof p.honesty === 'number') ? p.honesty : (parseFloat(p.honesty) || null);
  var honestyBlock = '';
  if (honesty !== null && !isNaN(honesty)) {
    honestyBlock =
      '<div class="honesty-card">' +
        '<div class="honesty-line">Honesty<span class="honesty-score ' + honestyClass(honesty) + '">' + honesty + '/10</span></div>' +
        (p.notes ? '<div class="honesty-notes">' + esc(p.notes) + '</div>' : '') +
      '</div>';
  }
  return (
    '<div class="perspective ' + persClass(p.label) + '">' +
      '<div class="persp-head">' +
        '<div class="persp-label ' + labelClass(p.label) + '">' + esc(p.label || '?') + '</div>' +
        '<div class="persp-meta">' + (views ? views + ' views · ' : '') + ago + '</div>' +
      '</div>' +
      '<div class="persp-body">' + body + '</div>' +
      '<div class="persp-handle">— <a href="' + url + '" target="_blank" rel="noopener">' + handle + ' →</a></div>' +
      honestyBlock +
    '</div>'
  );
}

function renderStory(s) {
  var sid = 's' + Math.random().toString(36).substr(2, 9);
  var mp = s.main_post || {};
  var headline = esc(s.headline || mp.body || '(no headline)');
  var meta = '<span class="post-meta">' +
    (mp.handle ? esc(mp.handle) + ' · ' : '') +
    (mp.views ? '<span class="views">' + esc(mp.views) + ' views</span> · ' : '') +
    timeAgo(mp.posted) +
    '</span>';
  var perspectives = (s.perspectives || []).map(renderPerspective).join('');
  return (
    '<div class="story" id="' + sid + '">' +
      '<div class="story-header" onclick="document.getElementById(\'' + sid + '\').classList.toggle(\'open\');">' +
        '<span class="arrow">▶</span>' +
        '<span class="story-headline-text">' + headline + meta + '</span>' +
      '</div>' +
      '<div class="story-body">' + perspectives + '</div>' +
    '</div>'
  );
}

function renderContent() {
  var el = document.getElementById('content');
  var today = todayLabel();
  var sectionName = activeTab === 'usa' ? 'USA' : 'World';
  var stories = NEWS_DATA ? (NEWS_DATA[activeTab] || []) : [];
  var subtitle = '<span class="label-conservative">Conservative</span>, <span class="label-independent">Independent</span>, <span class="label-democrat">Democrat</span> posts. Click block to view. Honesty 1–10.';
  var h = '<div class="section-label">' + sectionName + ' — ' + today + '</div>' +
          '<h1>Top ' + sectionName + ' Story' + (stories.length === 1 ? '' : 's') + ' of the Day</h1>' +
          '<p class="subtitle">' + subtitle + '</p>';
  if (!stories.length) {
    h += '<div class="empty-msg">Stories will appear here after the next refresh.</div>';
  } else {
    h += stories.map(renderStory).join('');
  }
  // Last updated
  if (NEWS_DATA && NEWS_DATA.last_updated) {
    var ts = new Date(NEWS_DATA.last_updated);
    h += '<div style="text-align:center; color:#f0e6d6; font-size:0.78rem; margin-top:24px;">Last updated: ' +
         ts.toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) + '</div>';
  }
  el.innerHTML = h;
}

function renderNav() {
  document.querySelectorAll('#nav a').forEach(function(a) {
    a.classList.toggle('active', a.dataset.tab === activeTab);
    a.onclick = function() { activeTab = a.dataset.tab; renderNav(); renderContent(); window.scrollTo(0, 0); };
  });
}

function updateFreshness() {
  var b = document.getElementById('freshnessBadge');
  if (!b) return;
  if (!NEWS_DATA || !NEWS_DATA.last_updated) { b.textContent = 'no data'; return; }
  var diffMin = Math.floor((Date.now() - new Date(NEWS_DATA.last_updated).getTime()) / 60000);
  if (diffMin < 60) b.textContent = diffMin + 'm ago · tap to refresh';
  else b.textContent = Math.floor(diffMin / 60) + 'h ago · tap to refresh';
}

function hardRefresh() {
  var u = new URL(window.location.href);
  u.searchParams.set('_r', Date.now());
  window.location.replace(u.toString());
}

function loadData() {
  fetch('data/stories.json?_=' + Date.now())
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) {
      NEWS_DATA = d || { last_updated: null, world: [], usa: [] };
      document.getElementById('currentDate').textContent = formatDate();
      updateFreshness();
      renderNav();
      renderContent();
    })
    .catch(function() {
      document.getElementById('content').innerHTML = '<div class="empty-msg">Could not load stories. Make sure <code>data/stories.json</code> exists.</div>';
    });
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
