<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>grokbuildcompare — Grok-Build X-Native Curation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #c9a67a; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
  /* Masthead tightened so stories come into view sooner. Header padding
     and bottom margin shrunk; tagline pulled closer to the logo. */
  header { background: #f7f2ea; color: #1c1410; padding: 10px 28px 0; border-bottom: 3px solid #d4b896; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 0; }
  /* Logo: italic Playfair Display, the eXpressO News voice. Same typeface
     David is using on the sister site so the family resemblance reads. */
  .logo { font-family: "Playfair Display", Georgia, serif; font-size: 1.9rem; font-weight: 800; font-style: italic; letter-spacing: -0.7px; color: #1c1410; }
  .build-tag { display: inline-block; margin-left: 8px; padding: 2px 8px; background: #b8860b; color: #fff; font-size: 0.55rem; font-weight: 700; letter-spacing: 1px; border-radius: 8px; vertical-align: middle; }
  /* Tagline tighter — small margin so the nav rides up close to the logo. */
  .tagline { font-size: 0.62rem; letter-spacing: 2.2px; text-transform: uppercase; color: #8a7e72; margin: 2px 0 6px; font-weight: 500; }
  .date { font-size: 0.78rem; color: #6b5d4f; font-weight: 500; }
  .freshness-badge { display: inline-block; margin-left: 10px; padding: 4px 10px; background: #ede8e0; color: #6b5d4f; font-size: 0.7rem; font-weight: 600; border-radius: 12px; cursor: pointer; user-select: none; border: 1px solid #d4b896; }
  .freshness-badge:hover { background: #e0d8cb; color: #1c1410; }
  /* Pill-style nav (polish: rounded, hover lift, active filled with cream-gold) */
  /* Nav: tightened top margin/padding so the masthead-to-content distance
     shrinks. Stories come up sooner without losing visual hierarchy. */
  nav { display: flex; gap: 4px; margin-top: 4px; border-top: 1px solid #e5dcc8; padding-top: 6px; flex-wrap: wrap; }
  nav a { color: #8a7e72; text-decoration: none; padding: 7px 14px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; border-radius: 9999px; transition: background 0.2s, color 0.2s, transform 0.1s; }
  nav a:hover { color: #3a2a18; background: #ede4cf; }
  nav a:active { transform: translateY(1px); }
  nav a.active { color: #fff8ee; background: #b8860b; font-weight: 700; box-shadow: 0 1px 4px rgba(184,134,11,0.35); }
  /* MSM tab — strikethrough red, gets an X badge */
  nav a.msm-tab { color: #c0392b; text-decoration: line-through; position: relative; padding-right: 22px; }
  nav a.msm-tab::after { content: "✕"; position: absolute; right: 8px; top: 5px; font-size: 0.65rem; color: #c0392b; font-weight: 800; text-decoration: none; }
  nav a.msm-tab:hover { background: #fbe9e9; color: #a02e21; }
  nav a.msm-tab.active { background: #c0392b; color: #fff; text-decoration: line-through; }
  nav a.msm-tab.active::after { color: #fff8ee; }
  main { flex: 1; padding: 24px 28px 36px; max-width: 1280px; margin: 0 auto; width: 100%; }

  /* Hero — big newspaper-style headline at top of every tab. When the
     tab has a themed accent thumbnail (ported from eXpressO), it sits
     to the left of the text at ~96px, rounded, with a faint border to
     read on the brown background. Smaller scale at narrow widths. */
  .hero { margin-bottom: 28px; padding-bottom: 22px; border-bottom: 1px dashed rgba(247,242,234,0.35); display: flex; gap: 22px; align-items: flex-start; }
  .hero .hero-text { flex: 1; min-width: 0; }
  /* Hero accent bumped from 96 → 140px so subject is clearly visible
     (user 2026-06-07: 'Bigger picture of Rory.' on Sports). Drops to
     96px on narrow screens so it doesn't crowd the headline. */
  .hero-accent { width: 140px; height: 140px; flex-shrink: 0; object-fit: cover; border-radius: 12px; border: 1px solid rgba(247,242,234,0.25); box-shadow: 0 3px 12px rgba(40,20,0,0.28); }
  @media (max-width: 700px) {
    .hero-accent { width: 96px; height: 96px; border-radius: 10px; }
  }
  @media (max-width: 480px) {
    .hero-accent { width: 64px; height: 64px; border-radius: 8px; }
  }
  .hero h1 { font-family: "Playfair Display", Georgia, serif; font-size: 2.6rem; font-weight: 900; line-height: 1.05; color: #fff8ee; letter-spacing: -1px; text-shadow: 0 2px 4px rgba(60,30,0,0.35); margin-bottom: 12px; }
  .hero p { color: #f0e6d6; font-size: 1.02rem; line-height: 1.55; max-width: 660px; font-weight: 400; }
  .hero .accent-word { color: #ffd479; font-style: italic; font-weight: 800; }

  .section-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.6px; color: #f0e6d6; margin-bottom: 6px; font-weight: 700; }
  h1 { font-family: "Playfair Display", Georgia, serif; font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; line-height: 1.2; color: #fff8ee; text-shadow: 0 1px 3px rgba(80,40,0,0.3); }
  .subtitle { color: #f0e6d6; font-size: 0.88rem; margin-bottom: 22px; line-height: 1.5; }
  .subtitle .label-conservative { color: #c45a4a; font-weight: 700; }
  .subtitle .label-independent { color: #ffffff; font-weight: 700; }
  .subtitle .label-democrat { color: #3d80c2; font-weight: 700; }

  /* World / Nation / Business tab — ROW-MAJOR 3×3 grid. Per cron run Grok
     supplies up to 3 stories per category; rendered as 3 rows × 3 cols
     (Row 1 = W#1·N#1·B#1, etc.). Each row's height = tallest card in the
     row, so row boundaries stay aligned even when cards differ in height. */
  /* Row layout: each card uses its NATURAL height (align-items: start)
     so when one card expands the others don't grow huge whitespace to
     match. The 2-line clamps on headlines + perspectives keep the
     natural heights tight, so the row tops still line up nicely even
     without forced stretching. overflow: hidden + min-width: 0
     prevent any inner grid overflow past the rounded card border. */
  .main-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; align-items: start; }
  .main-grid > .col-title { margin-bottom: 0; }
  .main-grid > .main-story-block { margin-bottom: 0; box-sizing: border-box; overflow: hidden; min-width: 0; }
  .main-grid > .main-story-block > .perspectives-row { width: 100%; min-width: 0; box-sizing: border-box; }
  .main-grid > .main-story-block > .perspectives-row > .perspective { min-width: 0; }

  /* Row tier — flattened per user 2026-06-07 ("same size font for all
     title blocks for symmetry and composition"). All three rows now use
     the default headline / meta / perspective sizes from the base
     .main-story-block rules. The data-row attribute is preserved so
     CSS clamps and other row-specific behaviors can still target it
     without per-row font tiering muddying the visual.
     OLD: row 0 was 1.22rem, default 1.12rem, row 2 was 0.96rem.
     NEW: every row 1.12rem. Same padding. Same line-height. Same
     perspective tile size. Reads as a uniform grid. */
  /* Per-row perspective post-body clamp still varies by row — keeps
     2-line discipline on every row for height-rhythm. */
  .main-story-block[data-row="0"] .perspective .post-body { -webkit-line-clamp: 2; }
  .main-story-block[data-row="2"] .perspective .post-body { -webkit-line-clamp: 2; }
  .main-story-block[data-row="2"] .perspective .post-body { -webkit-line-clamp: 2; font-size: 0.73rem; }
  .main-story-block[data-row="2"] .perspective .meta-line { font-size: 0.58rem; margin-top: 4px; }
  .main-grid > .more-list { margin-top: 0; }
  .main-story-empty { /* invisible placeholder keeps row alignment */ min-height: 1px; }
  @media (max-width: 750px) {
    .main-grid { grid-template-columns: 1fr; }
    /* Hide column titles on mobile — rows of 3 collapse to a single
       interleaved stack (W#1, N#1, B#1, W#2, N#2, B#2, …). */
    .main-grid > .col-title { display: none; }
    .main-story-empty { display: none; }
  }
  /* (Legacy alias — kept for any non-Main usage of these classes) */
  .columns { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
  .col-section { background: rgba(247,242,234,0.22); border: 1px solid #d4b896; border-radius: 10px; padding: 14px 16px; }

  /* Main tab — "3 stories on top / 6 perspectives below" config, eXpressO-styled.
     Card layout:
       Headline (Playfair, prominent)
       Meta row: views · ↑ velocity badge · age
       2 perspective TEASER boxes side-by-side (label + truncated text)
       ONE shared .perspective-details panel below the teasers — hidden
         by default; clicking a teaser populates it with the full post
         text, the inline X widget embed (eXpressO-style — the widget
         itself carries the native view-on-X affordance), the
         per-perspective honesty score, and the note.
         Click same teaser again to close. */
  .main-story-block { background: #faf6f0; border: 1px solid #d4b896; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(80,50,20,0.12); transition: transform 0.18s, box-shadow 0.18s; }
  .main-story-block:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(80,50,20,0.22); }
  /* Headline + (views · age · honesty) live together in a subtle bordered
     inner block. Click-to-expand like the perspective tiles — same shared
     details panel, same ⊞/⊟ icon top-right. */
  .main-story-header-block { cursor: pointer; border: 1px solid #e5dcc8; border-radius: 7px; padding: 16px 16px 14px; margin-bottom: 10px; background: #fffdf7; transition: transform 0.12s, box-shadow 0.12s; }
  .main-story-header-block:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(80,50,20,0.18); }
  .main-story-header-block.is-selected { outline: 2px solid #b8860b; outline-offset: 1px; }
  /* Headline clamped to 2 lines on every row. Same target on every
     card so row-bottoms line up at the same compact height as the
     bottom-left card (per user 2026-06-06: "Two lines of text for the
     top main block and two lines for the sub perspective blocks").
     Without -webkit-line-clamp, long 3-line headlines would push the
     row height up and create the ragged-bottom whitespace problem. */
  .main-story-headline { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 1.12rem; line-height: 1.33; font-weight: 700; color: #1c1410; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; letter-spacing: -0.1px; }

  /* Eyebrow label above each main story — eXpressO newspaper touch.
     Tiny uppercase category + velocity descriptor. Sits just above
     the headline, gold underline color. */
  .main-story-eyebrow { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1.6px; color: #b8860b; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .main-story-eyebrow .eyebrow-dot { width: 4px; height: 4px; background: #ffd479; border-radius: 50%; box-shadow: 0 0 6px rgba(255,212,121,0.7); flex-shrink: 0; }
  .main-story-meta { display: flex; flex-wrap: nowrap; gap: 4px 6px; align-items: baseline; font-size: 0.72rem; color: #6b5d4f; font-weight: 500; margin-bottom: 0; white-space: nowrap; overflow: hidden; }
  .main-story-meta > * { flex-shrink: 0; white-space: nowrap; }
  .main-story-meta .views { color: #b8860b; font-weight: 700; }
  .main-story-meta .sep { color: #c5b59d; }
  /* Main honesty score — plain bold text, no chip (same treatment as
     perspective teaser meta). */
  .main-story-meta .honesty-score,
  .post-meta .honesty-score,
  .ifollow-meta .honesty-score { background: transparent; color: inherit; padding: 0; border-radius: 0; font-size: inherit; font-weight: 700; }
  /* Expand-toggle square (the □) inline at end of every meta row.
     Same affordance Main uses; extended to .post-meta + .ifollow-meta
     so Elon/Free/MSM/iFollow all match. */
  .post-meta .expand-toggle,
  .ifollow-meta .expand-toggle { display: inline-block; width: 10px; height: 10px; border: 1px solid #8a7e72; border-radius: 2px; vertical-align: -1px; margin-left: 2px; }
  /* Perspective TEASERS — 2-up grid, half-width each. */
  .main-story-block .perspectives-row { grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0; margin-bottom: 0; }
  .main-story-block .perspectives-row .perspective:last-child:nth-child(odd) { grid-column: 1 / -1; }
  .main-story-block .perspective.perspective-teaser { cursor: pointer; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 0.76rem; padding: 7px 10px 7px; line-height: 1.34; transition: transform 0.12s, box-shadow 0.12s; }
  .main-story-block .perspective.perspective-teaser:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(80,50,20,0.18); }
  .main-story-block .perspective.perspective-teaser.is-selected { outline: 2px solid #b8860b; outline-offset: 1px; }
  /* Maximize / Restore icons — drawn in pure CSS as box outlines so they
     render identically on every platform (Mac/Windows/iOS/Android), not
     dependent on glyph coverage of the Microsoft window-control
     codepoints (those were falling back to a thin vertical bar on the
     user's font).
       Collapsed (maximize):  one square outline ▢
       Expanded  (restore):   two overlapping square outlines ❐
     pointer-events:none — the tile / block is still the click target. */
  .expand-toggle { display: inline-block; position: relative; width: 11px; height: 11px; vertical-align: -1.5px; margin-left: 2px; color: #8a7e72; user-select: none; pointer-events: none; transition: color 0.12s; }
  /* Front square (always shown) */
  .expand-toggle::before {
    content: '';
    position: absolute;
    top: 1px; left: 1px;
    width: 9px; height: 9px;
    border: 1.3px solid currentColor;
    border-radius: 1.5px;
    box-sizing: border-box;
    background: transparent;
    transition: top 0.12s, left 0.12s, width 0.12s, height 0.12s;
  }
  /* Selected: shift the front square down-left and draw a back square
     up-right to form the classic two-overlap-squares restore icon. */
  .is-selected .expand-toggle,
  .is-selected.perspective .expand-toggle { color: #b8860b; }
  .is-selected > .meta-line .expand-toggle::before,
  .is-selected .main-story-meta .expand-toggle::before,
  .is-selected.perspective .meta-line .expand-toggle::before {
    top: 3px; left: 0;
    width: 8px; height: 8px;
  }
  .is-selected > .meta-line .expand-toggle::after,
  .is-selected .main-story-meta .expand-toggle::after,
  .is-selected.perspective .meta-line .expand-toggle::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 8px; height: 8px;
    border: 1.3px solid currentColor;
    border-radius: 1.5px;
    box-sizing: border-box;
    background: transparent;
  }
  /* Color of the tile IS the label — drop the textual side label and the
     "tap for full + honesty" hint. The colored border tells you all you
     need to know; click to expand. */
  .main-story-block .perspective .label,
  .main-story-block .perspective .teaser-hint { display: none; }
  /* Meta line sits at the BOTTOM of the perspective tile (below the body):
     views · age · honesty-score — all one row, all plain text, no chips,
     NEVER wraps. If a viewport is so narrow the line would overflow, it
     clips at the right edge rather than wrapping to a second line. */
  .main-story-block .perspective .meta-line { font-size: 0.62rem; margin-top: 5px; margin-bottom: 0; display: flex; flex-wrap: nowrap; gap: 3px 5px; align-items: baseline; white-space: nowrap; overflow: hidden; }
  .main-story-block .perspective .meta-line > * { flex-shrink: 0; white-space: nowrap; }
  /* Honesty score appears as plain bold text inline with the rest of the
     meta — no colored chip, no padding, no rounded background. The
     details panel keeps the full color-coded chip; only the teaser
     meta line is stripped. */
  .main-story-block .perspective .meta-line .honesty-score {
    background: transparent;
    color: inherit;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
    font-weight: 700;
  }
  /* Default row's perspective body clamped to 2 lines (was 3) — same
     target the user pointed at on the bottom-left card. Top row also
     overridden to 2 above; bottom row was already 2. Everything
     converges to the same compact height. */
  .main-story-block .perspective .post-body { -webkit-line-clamp: 2; font-size: 0.76rem; margin-bottom: 0; line-height: 1.34; }
  .main-story-block .perspective .tweet-embed-container,
  .main-story-block .perspective .honesty-fold { display: none; } /* Main: no embeds, honesty is in shared details panel */
  /* Shared details panel — sits below the teasers row, spans full card width. */
  .perspective-details { display: none; margin-top: 11px; padding: 11px 12px; background: #fffdf7; border: 1px solid #d4b896; border-radius: 7px; box-shadow: inset 0 1px 0 rgba(255,250,235,0.6); animation: persp-pop 0.16s ease-out; }
  @keyframes persp-pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  /* pd-label + pd-meta intentionally removed: the colored teaser above
     already conveys side + views + age. Details panel starts at the body. */
  .perspective-details .pd-body { font-size: 0.82rem; color: #2a2218; line-height: 1.5; margin-bottom: 9px; white-space: pre-wrap; word-wrap: break-word; }
  .perspective-details .tweet-embed-container { margin: 0 0 10px; }
  .perspective-details .pd-honesty { display: flex; align-items: baseline; gap: 8px; margin-top: 9px; padding-top: 9px; border-top: 1px dashed #d4b896; }
  .perspective-details .pd-honesty .honesty-score { font-weight: 800; padding: 2px 8px; border-radius: 9px; font-size: 0.84rem; }
  .perspective-details .pd-honesty .honesty-label { font-size: 0.66rem; color: #6b5d4f; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .perspective-details .pd-note { font-size: 0.76rem; color: #5a4a30; line-height: 1.45; margin-top: 6px; }
  /* Narrow viewports: collapse teasers to single column */
  @media (max-width: 1100px) {
    .main-story-block .perspectives-row { grid-template-columns: 1fr; }
    .main-story-block .perspectives-row .perspective:last-child:nth-child(odd) { grid-column: auto; }
  }
  /* Column header — placard image + Playfair title + tight subtitle.
     Ported from eXpressO's design DNA. The placards (Hormuz Strait for
     World, Apple Pie for Nation, Trading Places for Business) sit above
     the section name, gold-bordered, rounded, low-key. */
  .col-header { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #b8860b; }
  /* Placard taller (88px from 72) + object-position higher so the
     Strait of Hormuz body of water + the Iranian/Omani coastlines
     are both visible — you can tell at a glance what it is and
     where, per user 2026-06-07 ("Zoom out just a tiny bit on the
     Strait of Hormuz picture next to world so you can see clearly
     what it is. Where it is."). */
  .col-placard { display: block; width: 100%; height: 88px; object-fit: cover; object-position: center 35%; border-radius: 6px; border: 1px solid rgba(184,134,11,0.5); box-shadow: 0 2px 6px rgba(40,20,0,0.22); margin-bottom: 8px; }
  .col-title { font-family: "Playfair Display", Georgia, serif; font-size: 1.25rem; font-weight: 900; color: #fff8ee; text-shadow: 0 1px 2px rgba(80,40,0,0.4); margin-bottom: 2px; letter-spacing: 0.4px; display: flex; align-items: center; gap: 8px; }
  .col-title::before { content: ''; width: 6px; height: 6px; background: #ffd479; border-radius: 50%; box-shadow: 0 0 8px rgba(255,212,121,0.6); }
  .col-sub { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 1.4px; color: #f0e6d6; font-weight: 600; opacity: 0.85; }

  /* Honesty score as inline link to its note. When a note exists, the
     score itself is the affordance — underlined, blue, click to expand
     the note inline. No separate ▼ notes line, no green/yellow pill.
     Consistent on every tab. When there's no note, the score renders
     as plain text (the .honesty-score rule). */
  .honesty-link { color: #1f6feb; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 2px; cursor: pointer; font-weight: 700; }
  .honesty-link:hover { color: #0a4fb8; }
  .honesty-note-body { display: none; margin-top: 6px; padding: 7px 10px; background: #f4ede0; border-left: 2px solid #1f6feb; border-radius: 3px; font-size: 0.74rem; color: #4a3a25; line-height: 1.5; }
  .honesty-note-body.open { display: block; }

  /* Earlier tab — per-category section + grid of demoted W/N/B cards */
  .earlier-section { margin-bottom: 28px; }
  .earlier-section .col-title { margin-bottom: 14px; }
  .earlier-section .earlier-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; align-items: start; }
  @media (max-width: 750px) {
    .earlier-section .earlier-list { grid-template-columns: 1fr; }
  }

  /* 3-up grid for Elon + Sports tabs */
  .three-up { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }

  /* Story block — accordion mechanics with hover lift */
  /* Story block — matched to eXpressO's exact values so the two sites
     read identical (2026-06-07 user: "All blocks the same size, same
     font as on the eXpressO site").
     Border-radius 6px (was 8px); margin-bottom 10px (was 12px). */
  .story { border: 1px solid #d4b896; border-radius: 6px; margin-bottom: 10px; background: #faf6f0; overflow: hidden; box-shadow: 0 2px 8px rgba(80,50,20,0.15); transition: transform 0.18s, box-shadow 0.18s; }
  .story:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(80,50,20,0.22); }
  .story.open { transform: none; }
  /* Story header — eXpressO-exact: padding 14px 18px, weight 600,
     font-size 0.9rem, line-height 1.4. Standard everywhere a .story
     renders (Elon / Sports / Free / MSM / Earlier / iFollow). */
  .story-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; font-weight: 600; font-size: 0.9rem; line-height: 1.4; color: #1a1a1a; transition: background 0.15s; user-select: none; }
  .story-header:hover { background: #f4ede0; }
  .arrow { color: #b8860b; font-size: 0.85rem; flex-shrink: 0; transition: transform 0.2s; margin-top: 2px; }
  .story.open > .story-header .arrow { transform: rotate(90deg); }
  .story-headline-text { flex: 1; line-height: 1.32; font-size: 0.97rem; }
  .post-meta { font-size: 0.69rem; color: #8a7e72; font-weight: 500; margin-top: 4px; display: block; }
  .post-meta .views { color: #b8860b; font-weight: 700; }
  /* Story body — eXpressO-exact padding so the expanded view rhythm
     matches: 18px sides + 40px left indent (aligned with arrow). */

  var m = (url || '').match(/\/status\/(\d+)/);

    var id = BigInt(m[1]);
    var tsMs = Number((id >> 22n) + 1288834974657n);

  if (!date || isNaN(date.getTime())) return '';
  var diffSec = (Date.now() - date.getTime()) / 1000;

  if (diffSec < 60) return 'just now';
  if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm ago';
  if (diffSec < 86400) return Math.floor(diffSec / 3600) + 'h ago';
  return Math.floor(diffSec / 86400) + 'd ago';

    var d = ageFromXUrl(urlForFallback);

    var label = (typeof p.honesty === 'string') ? p.honesty : (v + '/10');
    // No more green/yellow honestyClass — plain text only, like every
    // other tab. Note (if present) appears inline below; the panel
    // already shows it via .pd-note, so no link wiring needed here.
    html += '<div class="pd-honesty">' +
      '<span class="honesty-score">' + esc(label) + '</span>' +
      '<span class="honesty-label">Honesty</span>' +
    '</div>';
  }
  if (p.note) html += '<div class="pd-note">' + esc(p.note) + '</div>';
  panel.innerHTML = html;
  panel.style.display = 'block';
  panel.dataset.openPid = pid;
  if (clicked) clicked.classList.add('is-selected');
  // Trigger the X embed widget to load (renderEmbedSlot stamps a hidden
  // .tweet-embed-container; toggleEmbed populates it with the iframe).
  var slot = panel.querySelector('.tweet-embed-container[data-tweet-url]');
  if (slot) toggleEmbed(slot.id, slot.getAttribute('data-tweet-url'));
}
function toggleEmbed(containerId, tweetUrl) {
  var container = document.getElementById(containerId);
  if (!container) return;
  if (container.style.display !== 'none' && container.innerHTML) {
    container.style.display = 'none'; return;
  }
  container.style.display = 'block';
  container.innerHTML = '<div style="color:#8a7e72;font-size:0.78rem;padding:6px;">Loading post…</div>';
  var m = (tweetUrl || '').match(/status\/(\d+)/);
  if (!m) { container.innerHTML = '<div style="color:#c0392b;font-size:0.78rem;padding:6px;">Could not load embed.</div>'; return; }
  var tweetId = m[1];
  function render() {
    container.innerHTML = '';
    window.twttr.widgets.createTweet(tweetId, container, { theme: 'light', dnt: true, conversation: 'none' });
  }
  if (window.twttr && window.twttr.widgets) { render(); return; }
  var sc = document.createElement('script');
  sc.src = 'https://platform.twitter.com/widgets.js'; sc.async = true; sc.onload = render;
  document.head.appendChild(sc);
}

// Perspective sides are RED / WHITE / BLUE only.
// Three valid pairings per story: C+I, I+D, C+D.
// Canonical render order is ALWAYS left-to-right: Conservative → Independent → Democrat
// (sideRank() below; the renderer sorts perspectives by it before paint).
// Any non-canonical side label (Skeptical, Bullish, etc.) is coerced
// to one of {Conservative, Independent, Democrat} via aliases below.
// Display label is normalised to match the color so users never see
// e.g. a red tile labeled "Skeptical" — it just says "Conservative".
function persClassForSide(side) {
  var k = (side || '').toLowerCase();
  if (k === 'conservative' || k === 'skeptical' || k === 'concerned' ||
      k === 'critical' || k === 'worried' || k === 'cautious' ||
      k === 'bearish' || k === 'right')
    return { box: 'perspective-conservative', lab: 'cons', display: 'Conservative' };
  if (k === 'democrat' || k === 'progressive' || k === 'left' ||
      k === 'supportive' || k === 'bullish' || k === 'excited' ||
      k === 'optimistic' || k === 'positive' || k.indexOf('fan') !== -1)
    return { box: 'perspective-democrat', lab: 'dem', display: 'Democrat' };
  // Default: Independent / white. Catches Mixed, Neutral, Balanced,
  // Uncertain, and anything else.
  return { box: 'perspective-independent', lab: 'ind', display: 'Independent' };
}

// Parse Grok's view strings ("254K", "1.07M", "3K", "873", "1.5B") into
// a comparable integer. Returns 0 on garbage / missing input so sorts
// don't blow up when a story is missing its views field.
function viewsNumber(views) {
  if (!views) return 0;
  var s = String(views).trim().toUpperCase().replace(/,/g, '');
  var m = s.match(/^([\d.]+)\s*([KMB])?$/);
  if (!m) return 0;
  var n = parseFloat(m[1]);
  if (isNaN(n)) return 0;
  if (m[2] === 'K') n *= 1000;
  else if (m[2] === 'M') n *= 1e6;
  else if (m[2] === 'B') n *= 1e9;
  return n;
}

// Canonical left-to-right ordering: red → white → blue.
// Use the same alias coercion as persClassForSide so non-canonical
// side labels still slot into the right rank.
function sideRank(p) {
  if (!p) return 99;
  var d = persClassForSide(p.side).display;
  if (d === 'Conservative') return 0;  // red, leftmost
  if (d === 'Independent')  return 1;  // white, middle
  if (d === 'Democrat')     return 2;  // blue, rightmost
  return 99;
}

function renderEmbedSlot(url) {
  if (!isXStatusUrl(url)) return '';
  var id = 'em' + Math.random().toString(36).substr(2, 9);
  return '<div id="' + id + '" class="tweet-embed-container" data-tweet-url="' + esc(url) + '" style="display:none;"></div>';
}

function renderHonestyFold(honesty, note) {
  var v = honestyParse(honesty);
  if (v == null) return '';
  var hid = 'h' + Math.random().toString(36).substr(2, 9);
  return (
    '<div class="honesty-fold" id="' + hid + '">' +
      '<div class="honesty-fold-head" onclick="event.stopPropagation();document.getElementById(\'' + hid + '\').classList.toggle(\'open\');">' +
        '<span class="arrow-mini">▶</span>' +
        '<span>Honesty <span class="honesty-score ' + honestyClass(v) + '">' + (typeof honesty === 'string' ? honesty : (v + '/10')) + '</span></span>' +
      '</div>' +
      '<div class="honesty-fold-body">' + (note ? esc(note) : 'No notes provided.') + '</div>' +
    '</div>'
  );
}

// Parent post context for replies and quote-tweets.
// X's worst UX problem: someone responds to a thread and the original
// post isn't shown, so readers have no idea what's being reacted to.
// Whenever Grok ships an entry with parentPost{url,text,handle,time,views},
// we embed the parent X post inline above the source. Same widget the
// source uses, so the reader sees full context without leaving the page.
//
// Schema:
//   parentPost: { url, handle, text, time, views }
// Behavior:
//   - With a real X /status/ URL → embed the parent post as a full
//     X widget (auto-loads through Twitter's oembed).
//   - Without a URL → fall back to a tight text snippet + handle line.
//   - Returns '' (no affordance, no orphan box) when parentPost is absent.
function renderParentPost(pp) {
  if (!pp || typeof pp !== 'object') return '';
  var pAgo = timeAgo(pp.time, pp.url);
  var headLine = '<div class="parent-head">In reply to ' +
    esc(pp.handle || '@user') + (pAgo ? ' · ' + pAgo : '') + '</div>';
  // Real X URL → embed the parent post in full.
  if (isXStatusUrl(pp.url)) {
    return '<div class="parent-post">' +
             headLine +
             renderEmbedSlot(pp.url) +
           '</div>';
  }
  // No URL → tight text fallback (legacy path; Grok should always send a URL).
  var text = (pp.text || '').trim();
  if (!text) return '';
  return '<div class="parent-post parent-post-textfallback">' +
           headLine +
           '<div class="parent-text">' + esc(text.substring(0, 220)) +
             (text.length > 220 ? '…' : '') + '</div>' +
         '</div>';
}

// Media post — the "show me the clip" companion to a source post.
// When the source describes an event (goal, dunk, strike, vote, etc.),
// Grok finds a related X post that has the actual video/photo of that
// event and ships it as mediaPost. Embedded inline BELOW the source.
//
// Schema:
//   mediaPost: { url, handle, text, time, views, label }
//
//   - url:    REQUIRED. Real X /status/ URL with the media payload.
//   - label:  Short noun describing the media. "Video of the goal",
//             "The dunk", "Footage of the strike", "Floor speech",
//             "Press conference clip". Defaults to "Watch" if absent.
//   - rest:   Display metadata (optional but recommended).
//
// Returns '' (no affordance, no orphan box) when mediaPost is absent.
function renderMediaPost(mp) {
  if (!mp || typeof mp !== 'object') return '';
  if (!isXStatusUrl(mp.url)) return '';
  var label = esc(mp.label || 'Watch');
  var who   = mp.handle ? ' · ' + esc(mp.handle) : '';
  var ago   = timeAgo(mp.time, mp.url);
  var head  = '<div class="media-head"><span class="media-label">▶ ' + label + '</span>' +
              '<span class="media-sub">' + who + (ago ? ' · ' + ago : '') + '</span></div>';
  return '<div class="media-post">' +
           head +
           renderEmbedSlot(mp.url) +
         '</div>';
}

// Inline "▼ notes" expand — same pattern as iFollow, used across Elon/Free/MSM.
// Renders nothing when there's no note (no orphan affordance).
function renderNoteFold(note) {
  if (!note) return '';
  var nid = 'nf' + Math.random().toString(36).substr(2, 9);
  return (
    '<div class="ifollow-note-fold" id="' + nid + '">' +
      '<span class="ifollow-note-toggle" onclick="event.stopPropagation();document.getElementById(\'' + nid + '\').classList.toggle(\'open\');">' +
        '<span class="ifollow-note-arrow">▼</span> notes' +
      '</span>' +
      '<div class="ifollow-note-body">' + esc(note) + '</div>' +
    '</div>'
  );
}

// Honesty piece for an inline meta row: just "8/10" — no "Honesty" word,
// no green/yellow pill. When a note is provided, the score itself becomes
// a blue underlined link (clicking it expands the note body). No separate
// ▼ notes affordance — the score IS the affordance. Consistent across
// every tab. Pair with honestyNoteBody() to render the hidden body.
//
// Returns the inline element string. nid (caller-provided) ties the link
// to its body so click→toggle works.
function honestyMetaPiece(honesty, note, nid) {
  var v = honestyParse(honesty);
  if (v == null) return '';
  var label = (typeof honesty === 'string' && /^\d/.test(honesty)) ? honesty : (v + '/10');
  if (note && nid) {
    return '<a class="honesty-link" href="javascript:void(0)" onclick="event.stopPropagation();document.getElementById(\'' + nid + '\').classList.toggle(\'open\');">' + esc(label) + '</a>';
  }
  return '<span class="honesty-score">' + esc(label) + '</span>';
}

// Hidden body for a honesty note — revealed when the inline honesty link
// is clicked. Returns '' when there's no note. Caller decides where to
// drop it inside the block (usually as the last child of .story-body or
// right after the meta line).
function honestyNoteBody(note, nid) {
  if (!note || !nid) return '';
  return '<div class="honesty-note-body" id="' + nid + '">' + esc(note) + '</div>';
}

// Generate a unique id for tying a honesty link to its note body.
function honestyNid() {
  return 'hn' + Math.random().toString(36).substr(2, 9);
}

// Expand-toggle square for the end of an inline meta row. Same □ Main
// uses, reused here so Elon/Free/MSM/iFollow all carry the affordance.
function metaExpandToggle() {
  return '<span class="expand-toggle" aria-hidden="true"></span>';
}

function renderSourceTile(mp) {
  if (!mp) return '';
  var url = mp.url || '';
  var ago = timeAgo(mp.time, url);
  return (
    '<div class="tile source-tile">' +
      '<div class="source-label">Source post</div>' +
      '<div class="meta-line">' +
        (mp.handle ? '<span class="handle">' + esc(mp.handle) + '</span>' : '') +
        (mp.views ? ' · <span class="views">' + esc(mp.views) + ' views</span>' : '') +
        (ago ? ' · ' + ago : '') +
      '</div>' +
      '<div class="post-body">' + esc(mp.text || mp.body || '').replace(/\n/g, '<br/>') + '</div>' +
      renderEmbedSlot(url) +
    '</div>'
  );
}

function renderPerspectiveTile(p) {
  if (!p) return '';
  // HARD RULE: every perspective tile MUST be backed by a real X post URL.
  // No URL with /status/ → drop the tile entirely. We do NOT render
  // hand-written editorial summaries dressed up as perspectives.
  var url = p.url || '';
  if (!isXStatusUrl(url)) return '';
  var pc = persClassForSide(p.side);
  var ago = timeAgo(p.time, url);
  return (
    '<div class="tile perspective ' + pc.box + '">' +
      '<div class="label ' + pc.lab + '">' + esc(pc.display) + '</div>' +
      '<div class="meta-line">' +
        (p.handle ? '<span class="handle">' + esc(p.handle) + '</span>' : '') +
        (p.views ? ' · <span class="views">' + esc(p.views) + ' views</span>' : '') +
        (ago ? ' · ' + ago : '') +
      '</div>' +
      '<div class="post-body">' + esc(p.text || '').replace(/\n/g, '<br/>') + '</div>' +
      renderEmbedSlot(url) +
      renderHonestyFold(p.honesty, p.note) +
    '</div>'
  );
}

// Single source of truth for "is this a real X post URL?"
function isXStatusUrl(u) {
  if (!u) return false;
  if (u.indexOf('/status/') === -1) return false;
  return u.indexOf('x.com') !== -1 || u.indexOf('twitter.com') !== -1;
}

// Generic story block with main_post + perspectives (perspectives sit
// side-by-side in a .perspectives-row grid below the source tile).
function renderStoryBlock(s) {
  var sid = 's' + Math.random().toString(36).substr(2, 9);
  var mp = s.main || s.main_post || {};
  var headline = esc(s.headline || mp.text || '(no headline)');
  var hdrAgo = timeAgo(mp.time, mp.url);
  // Inline meta row matching Main: handle · views · age · 8/10 · □
  // The 8/10 is the link to the note. Used by MSM tab.
  var blockNid = honestyNid();
  var blockNote = mp.note || s.note;
  var blockHonestyBit = honestyMetaPiece(mp.honesty || s.honesty, blockNote, blockNid);
  var meta = '<span class="post-meta">' +
    (mp.handle ? esc(mp.handle) + ' · ' : '') +
    (mp.views ? '<span class="views">' + esc(mp.views) + ' views</span>' : '') +
    (hdrAgo ? ' · ' + hdrAgo : '') +
    (blockHonestyBit ? ' · ' + blockHonestyBit : '') +
    ' · ' + metaExpandToggle() +
    '</span>';
  // Parent post first (replies/QTs lose meaning without context).
  var parentHtml = renderParentPost(mp.parentPost || mp.parent_post || s.parentPost || s.parent_post);
  var sourceTile = renderSourceTile(mp);
  var perspectives = (s.perspectives || []);
  var perspectivesRow = perspectives.length
    ? '<div class="perspectives-row">' + perspectives.map(renderPerspectiveTile).join('') + '</div>'
    : '';
  var blockNoteBody = honestyNoteBody(blockNote, blockNid);
  return (
    '<div class="story" id="' + sid + '">' +
      '<div class="story-header" onclick="toggleStory(\'' + sid + '\');">' +
        '<span class="arrow">▶</span>' +
        '<span class="story-headline-text">' + headline + meta + '</span>' +
      '</div>' +
      blockNoteBody +
      '<div class="story-body">' + parentHtml + sourceTile + perspectivesRow + '</div>' +
    '</div>'
  );
}

// Block for a single Elon post — one main post + optional counter-post
// (item.counter must be a real X post object with a URL; text-only
// summaries are NOT rendered. No URL → no counter tile.)
function renderElonBlock(item) {
  var sid = 'e' + Math.random().toString(36).substr(2, 9);
  var rawHeadline = item.headline || item.text || '(no headline)';
  var headline = esc(String(rawHeadline).replace(/^Elon:\s*/i, ''));
  var hdrAgo = timeAgo(item.time, item.url);
  // Single inline meta row matching Main exactly:
  //   @elonmusk · 330K views · 1h ago · 8/10 · □
  // The 8/10 is itself the link to the note (blue underlined) when a
  // note exists. No green/yellow pill, no separate ▼ notes line.
  var elonNid = honestyNid();
  var elonHonestyBit = honestyMetaPiece(item.honesty, item.note, elonNid);
  var meta = '<span class="post-meta">' +
    '@elonmusk' +
    (item.views ? ' · <span class="views">' + esc(item.views) + ' views</span>' : '') +
    (hdrAgo ? ' · ' + hdrAgo : '') +
    (elonHonestyBit ? ' · ' + elonHonestyBit : '') +
    ' · ' + metaExpandToggle() +
    '</span>';
  var sourceTile = renderSourceTile({
    handle: '@elonmusk',
    text: item.text,
    views: item.views,
    time: item.time,
    url: item.url
  });

  // Parent post context for replies — uses the shared renderParentPost
  // helper so every tab embeds the parent X post the same way.
  var parentHtml = renderParentPost(item.parentPost || item.parent_post);

  // Optional counter-post: render only when backed by a real X URL.
  // Accepts either a perspective-shaped object (handle/text/url/views/honesty/note)
  // or a bare URL string. Free-text editorial summaries are dropped.
  var counterTile = '';
  var c = item.counter || item.opposing_post || null;
  if (typeof c === 'string') c = { url: c };
  if (c && isXStatusUrl(c.url)) {
    counterTile = renderPerspectiveTile({
      side: c.side || 'Counter view',
      handle: c.handle,
      text: c.text,
      views: c.views,
      time: c.time,
      url: c.url,
      honesty: c.honesty,
      note: c.note
    });
  }
  // Honesty + note: the score in the meta row IS the link. Note body
  // sits OUTSIDE the .story-header flex container (was previously inside,
  // which squished the headline when the note opened — user-flagged
  // 2026-06-07 on the Elon SpaceX card).
  var elonNoteBody = honestyNoteBody(item.note, elonNid);
  return (
    '<div class="story" id="' + sid + '">' +
      '<div class="story-header" onclick="toggleStory(\'' + sid + '\');">' +
        '<span class="arrow">▶</span>' +
        '<span class="story-headline-text">' + headline + meta + '</span>' +
      '</div>' +
      elonNoteBody +
      '<div class="story-body">' + parentHtml + sourceTile + counterTile + '</div>' +
    '</div>'
  );
}

// Sports block — main post embed only, no perspectives, no honesty
function renderSportsBlock(item) {
  var sid = 'sp' + Math.random().toString(36).substr(2, 9);
  var headline = esc(item.headline || '(no headline)');
  var url = item.url || '';
  var hdrAgo = timeAgo(item.time, url);
  var meta = '<span class="post-meta">' +
    (item.views ? '<span class="views">' + esc(item.views) + ' views</span>' : '') +
    (hdrAgo ? ' · ' + hdrAgo : '') +
    '</span>';
  // Parent post first (when the sports post is a reply — e.g. SAS reacting
  // to a Knicks thread, Cowherd reacting to a Germany goal). Without the
  // parent the reader has no idea what's being celebrated/lamented.
  var parentHtml = renderParentPost(item.parentPost || item.parent_post);
  var sourceTile = renderSourceTile({ text: item.headline, views: item.views, time: item.time, url: url });
  return (
    '<div class="story" id="' + sid + '">' +
      '<div class="story-header" onclick="toggleStory(\'' + sid + '\');">' +
        '<span class="arrow">▶</span>' +
        '<span class="story-headline-text">' + headline + meta + '</span>' +
      '</div>' +
      '<div class="story-body">' + parentHtml + sourceTile + '</div>' +
    '</div>'
  );
}

// "Next most viewed" list inside a column
function renderMoreList(items) {
  if (!items || !items.length) return '';
  return '<div class="more-list">' +
    '<div class="more-list-head">Next most viewed</div>' +
    items.map(function(m) {
      var url = m.url || '#';
      var ago = timeAgo(m.time, m.url);
      return '<div class="more-item">' +
        '<a href="' + url + '" target="_blank" rel="noopener">' + esc(m.headline || m.text || '?') + '</a>' +
        '<span class="meta">' +
          (m.views ? '<span class="views">' + esc(m.views) + ' views</span>' : '') +
          (ago ? ' · ' + ago : '') +
        '</span>' +
      '</div>';
    }).join('') +
  '</div>';
}

// ---------- Tab renderers ----------

// Shared hero block — different copy per tab but same visual style
function renderHero(tab) {
  var heros = {
    // Hero subtitles unified: ~15–22 words, declarative tone, no inline
    // strong tags, factually accurate to the current contract. Headlines
    // keep their newspaper rhythm with the same line-break structure.
    // `img` is the small hero accent thumbnail (~96px) ported from eXpressO.
    main:    { h: 'The biggest conversations<br>on <span class="accent-word">X</span> right now.', p: 'Real velocity. Opposing perspectives where they exist. Honesty score and notes on every block. Strictly under 24 hours.', img: 'images/world.jpg' },
    elon:    { h: 'Elon\'s latest<br>and the pushback.',                       p: 'Every @elonmusk post from the last 24 hours, ranked by views. Counter view when there\'s a real X post to embed.', img: 'images/elon.jpg' },
    sports:  { h: 'Sports — what\'s<br>moving the needle.',                   p: 'Six top stories in a 3×2 grid — three velocity leaders, three pundit takes. The only tab without an honesty score.', img: 'images/sports.jpg' },
    ifollow: { h: 'People worth<br>following on X.',                          p: 'Hand-picked handles. One-line take and honesty score per person. Suggest someone at the bottom of the page.', img: 'images/tiktok.jpg' },
    free:    { h: 'Free speech<br>front and center.',                         p: 'Marc Andreessen always first. Then free-speech-themed posts kept across crons until manually cleared. The only tab that accumulates.', img: 'images/top.jpg' },
    msm:     { h: 'Stories the legacy<br>outlets won\'t touch.',              p: 'High-velocity X stories the mainstream is ignoring or downplaying. Same block format as everything else.', img: 'images/msm.jpg' },
    earlier: { h: 'Earlier today —<br>still worth a look.',                   p: 'World, Nation, and Business stories that rotated off the front page but are still under 24 hours old. Age off after a day.', img: 'images/earlier.jpg' }
  };
  var hero = heros[tab] || heros.main;
  var img = hero.img
    ? '<img class="hero-accent" src="' + hero.img + '" alt="" loading="lazy" />'
    : '';
  return '<div class="hero">' +
           img +
           '<div class="hero-text">' +
             '<h1>' + hero.h + '</h1>' +
             '<p>' + hero.p + '</p>' +
           '</div>' +
         '</div>';
}

// Main-tab story — "teaser + click-to-reveal-details" config, eXpressO-styled.
//   Headline (tight, Playfair)
//   Meta row: views · ↑ velocity badge · age
//   2 perspective TEASER boxes (label + truncated body, "tap to expand")
//   Shared .perspective-details panel below — populated on teaser click
//     with full body + inline X widget embed (eXpressO pattern) +
//     per-perspective honesty + note.
//
// X widget embeds are lazy: only the currently-open perspective's widget
// is loaded; closing the panel discards it. Honesty + note hidden until
// the panel opens.
function renderMainStoryBlock(story, rank, catLabel) {
  var blockId = 'b' + Math.random().toString(36).substr(2, 9);
  var panelId = blockId + '-details';
  var mp = story.main || story.main_post || {};
  var headline = esc(story.headline || mp.text || '(no headline)');
  var hdrAgo = timeAgo(mp.time, mp.url);
  // Eyebrow content: tiny category label + rank descriptor. eXpressO touch.
  // catLabel is passed from the renderTabMain loop (World / Nation / Business).
  // Falls back to story.category for Earlier tab entries.
  var eyebrowCat = catLabel || story.category || '';
  var rankLabel = ({1: 'Top story', 2: 'Also big', 3: 'Worth a look'})[rank] || '';
  var eyebrowHtml = '';
  if (eyebrowCat || rankLabel) {
    eyebrowHtml = '<div class="main-story-eyebrow">' +
                    '<span class="eyebrow-dot"></span>' +
                    esc(eyebrowCat) + (eyebrowCat && rankLabel ? ' &middot; ' : '') +
                    esc(rankLabel) +
                  '</div>';
  }

  // Register the main post as a pseudo-perspective so the header block
  // can use the same selectMainPerspective() handler + shared details
  // panel as the two perspective teasers below it.
  var mainPid = blockId + '_main';
  MAIN_PDB[mainPid] = {
    side: 'main',
    handle: mp.handle,
    text: mp.text,
    url: mp.url,
    views: mp.views,
    time: mp.time,
    honesty: mp.honesty,
    note: mp.note
  };

  // Meta = views + age + honesty + box-line icon. No velocity badge.
  // Icon sits AFTER honesty on the same line; whole header block is the
  // click target. The expand-toggle is the maximize/restore affordance.
  var metaBits = [];
  if (mp.views) metaBits.push('<span class="views">' + esc(mp.views) + ' views</span>');
  if (hdrAgo) metaBits.push('<span>' + hdrAgo + '</span>');
  // Honesty: use main.honesty if Grok provides it; otherwise derive as
  // the average of the perspectives' honesty scores (rounded to nearest
  // 0.5) so the top block always carries a score until Grok ships
  // main.honesty to the schema.
  var mainHonV = honestyParse(mp.honesty);
  if (mainHonV == null) {
    var pScores = (story.perspectives || [])
      .map(function(p) { return honestyParse(p && p.honesty); })
      .filter(function(v) { return v != null; });
    if (pScores.length) {
      var avg = pScores.reduce(function(a, b) { return a + b; }, 0) / pScores.length;
      mainHonV = Math.round(avg * 2) / 2;
    }
  }
  if (mainHonV != null) {
    var mainHLabel = (typeof mp.honesty === 'string' && /^\d/.test(mp.honesty))
      ? mp.honesty
      : (mainHonV + '/10');
    metaBits.push('<span class="honesty-score">' + esc(mainHLabel) + '</span>');
  }
  metaBits.push('<span class="expand-toggle" aria-hidden="true"></span>');
  var metaHtml = '<div class="main-story-meta">' +
    metaBits.join('<span class="sep">·</span>') + '</div>';

  // Filter perspectives to those with real X URLs (no editorial-only tiles).
  // Cap at 2 for Main tab to match "6 perspectives below" total (3 cards × 2).
  // Then canonical sort: Conservative (red) → Independent (white) → Democrat (blue),
  // always in that left-to-right order regardless of Grok's input order.
  var perspectives = (story.perspectives || [])
    .filter(function(p) { return p && isXStatusUrl(p.url); })
    .slice(0, 2)
    .sort(function(a, b) { return sideRank(a) - sideRank(b); });

  var teasersHtml = '';
  if (perspectives.length) {
    teasersHtml = '<div class="perspectives-row">' +
      perspectives.map(function(p, idx) {
        return renderMainPerspectiveTeaser(p, blockId, idx, panelId);
      }).join('') + '</div>';
  }
  // Shared details panel — used by BOTH the header block (mainPid) and
  // each perspective teaser. Always emitted so the header block can
  // populate it even when there are no perspectives.
  var detailsPanelHtml = '<div class="perspective-details" id="' + panelId + '"></div>';

  // Header block is now a click-to-expand surface, just like the perspective
  // teasers below it — same shared details panel. Clicking opens the main
  // post's text + inline X embed (+ honesty + note when Grok provides
  // main.honesty / main.note). No more external anchor — users never have
  // to leave the page to read the source post. The 🗖/🗗 icon sits inline
  // in the meta line (rendered by metaHtml).
  var headerBlockHtml =
    '<div class="main-story-header-block" data-pid="' + mainPid +
      '" onclick="selectMainPerspective(\'' + mainPid + '\',\'' + panelId + '\');">' +
      eyebrowHtml +
      '<div class="main-story-headline">' + headline + '</div>' +
      metaHtml +
    '</div>';

  // rank is 1-based (Row 1, Row 2, Row 3). data-row is 0-based for the
  // CSS [data-row="0|1|2"] selectors that drive the height tiering.
  return (
    '<div class="main-story-block" data-row="' + (rank - 1) + '">' +
      headerBlockHtml +
      teasersHtml +
      detailsPanelHtml +
    '</div>'
  );
}

// One Main-tab perspective teaser: label + meta + truncated body + hint.
// Stashes the perspective object in MAIN_PDB so selectMainPerspective()
// can hydrate the shared details panel without parsing data attributes.
function renderMainPerspectiveTeaser(p, blockId, idx, panelId) {
  var pid = blockId + '_p' + idx;
  MAIN_PDB[pid] = p;
  var pc = persClassForSide(p.side);
  var ago = timeAgo(p.time, p.url);
  // Bottom-row meta: views · age · honesty-score-chip — sits BELOW the body.
  var metaBits = [];
  if (p.views) metaBits.push('<span class="views">' + esc(p.views) + ' views</span>');
  if (ago)     metaBits.push(ago);
  var v = honestyParse(p.honesty);
  if (v != null) {
    var hLabel = (typeof p.honesty === 'string') ? p.honesty : (v + '/10');
    // Plain text in the meta line — no h-good/h-mid/h-poor class, no
    // colored chip. The details panel still uses the full chip styling.
    metaBits.push('<span class="honesty-score">' + esc(hLabel) + '</span>');
  }
  // 🗖/🗗 icon sits at the very end of the meta line, after honesty.
  metaBits.push('<span class="expand-toggle" aria-hidden="true"></span>');
  var metaLine = metaBits.length
    ? '<div class="meta-line">' + metaBits.join(' · ') + '</div>'
    : '';
  return (
    '<div class="tile perspective perspective-teaser ' + pc.box +
      '" data-pid="' + pid +
      '" onclick="selectMainPerspective(\'' + pid + '\',\'' + panelId + '\');">' +
      '<div class="label ' + pc.lab + '">' + esc(pc.display) + '</div>' +
      '<div class="post-body">' + esc(p.text || '').replace(/\n/g, '<br/>') + '</div>' +
      metaLine +
      '<div class="teaser-hint">tap for full post + honesty</div>' +
    '</div>'
  );
}

function renderTabMain() {
  // Reset the perspective DB — populated by renderMainPerspectiveTeaser
  // calls below. selectMainPerspective() reads from it on click.
  MAIN_PDB = {};
  var nd = NEWS_DATA || {};
  var sections = [
    { key: 'world',    title: 'World'    },
    { key: 'nation',   title: 'Nation'   },
    { key: 'business', title: 'Business' }
  ];
  var h = renderHero('main');

  // Resolve each category's story array. Schemas supported:
  //   FLAT (Grok's cron contract):   { world: [...], nation: [...], business: [...] }
  //   LEGACY (early grokpress):       { main: { world: { tops:[...] } } }
  //   ALIAS:                          tops[] / stories[] / top{}
  var byCat = sections.map(function(sec) {
    var raw = nd[sec.key];                              // flat schema first
    if (raw === undefined && nd.main) raw = nd.main[sec.key]; // legacy fall-back
    var tops = [];
    var more = undefined;
    if (Array.isArray(raw))                tops = raw;
    else if (raw && typeof raw === 'object') {
      if (Array.isArray(raw.tops))         tops = raw.tops;
      else if (Array.isArray(raw.stories)) tops = raw.stories;
      else if (raw.top)                    tops = [raw.top];
      more = raw.more;
    }
    return { sec: sec, tops: tops, more: more };
  });

  // Sort each category by main-post views (descending) so the top row
  // always holds the highest-velocity story per category. Row index
  // then drives card-size tiering via the [data-row] attribute below.
  byCat.forEach(function(x) {
    x.tops = (x.tops || []).slice().sort(function(a, b) {
      var av = viewsNumber((a && a.main && a.main.views) || (a && a.views));
      var bv = viewsNumber((b && b.main && b.main.views) || (b && b.views));
      return bv - av;
    });
  });

  // Row-major 3×3 grid: ROW r = [World#r, Nation#r, Business#r] across.
  // Each row's height = max of its 3 cards → alignment preserved even
  // when one card is taller than the others. Empty cells reserve their
  // slot so the next row doesn't shift left.
  var rowCount = Math.max(0,
    byCat[0].tops.length, byCat[1].tops.length, byCat[2].tops.length);

  h += '<div class="main-grid">';

  // Header row — placard image + section name + tight subtitle, one per column.
  // Images carried over from eXpressO News (Hormuz Strait for World, Apple
  // Pie for Nation, Trading Places still for Business). Subtitles in
  // eXpressO's tight-language style.
  var colArt = {
    world:    { img: 'images/world.jpg',    sub: 'The biggest international story.' },
    nation:   { img: 'images/usa.jpg',      sub: 'What the country is arguing about.' },
    business: { img: 'images/business.jpg', sub: 'Markets, money, what\'s moving.' }
  };
  byCat.forEach(function(x) {
    var art = colArt[x.sec.key] || {};
    h += '<div class="col-header">' +
           (art.img ? '<img class="col-placard" src="' + art.img + '" alt="" loading="lazy" />' : '') +
           '<div class="col-title">' + esc(x.sec.title) + '</div>' +
           (art.sub ? '<div class="col-sub">' + esc(art.sub) + '</div>' : '') +
         '</div>';
  });

  if (rowCount === 0) {
    h += '<div class="empty-msg" style="grid-column:1/-1;padding:14px;">No stories yet.</div>';
  } else {
    for (var r = 0; r < rowCount; r++) {
      byCat.forEach(function(x) {
        var t = x.tops[r];
        if (t) h += renderMainStoryBlock(t, r + 1, x.sec.title);
        else   h += '<div class="main-story-empty" aria-hidden="true"></div>';
      });
    }
  }

  // Trailing row — "Next most viewed" per category (placeholder if absent
  // so the 3-column rhythm holds).
  var anyMore = byCat.some(function(x) { return x.more && x.more.length; });
  if (anyMore) {
    byCat.forEach(function(x) {
      var ml = renderMoreList(x.more);
      h += ml || '<div class="main-story-empty" aria-hidden="true"></div>';
    });
  }

  h += '</div>';
  return h;
}

function renderTabElon() {
  var elon = (NEWS_DATA && NEWS_DATA.elon) || [];
  var h = renderHero('elon');
  if (!elon.length) {
    h += '<div class="empty-msg">No Elon posts in this cycle.</div>';
    return h;
  }
  // Two-column grid so blocks are narrower (per eXpressO News pattern,
  // user 2026-06-07: "Narrower blocks, not blocks that take all eight
  // and a half width of the page"). Drops to 1 column under 700px.
  h += '<div class="narrow-list">';
  elon.forEach(function(item) {
    h += renderElonBlock(item);
  });
  h += '</div>';
  return h;
}

function renderTabSports() {
  var sports = (NEWS_DATA && NEWS_DATA.sports) || [];
  var h = renderHero('sports');
  if (!sports.length) {
    h += '<div class="empty-msg">No sports stories in this cycle.</div>';
    return h;
  }
  // Single 3×2 grid: 6 items total, NO intermediate subhead. Contract per
  // shared-state/contract.md §3.Sports. Top row world/nation/highest-views,
  // bottom row pundits — but they read as one continuous grid to the user.
  h += '<div class="three-up">';
  sports.slice(0, 6).forEach(function(item) {
    h += '<div>' + renderSportsBlock(item) + '</div>';
  });
  h += '</div>';
  return h;
}

function renderTabIFollow() {
  var rawList = (NEWS_DATA && NEWS_DATA.ifollow) || [];
  // Sort by topPost views desc — most-viewed top-left, least bottom-right.
  // Handles without a topPost (no views) sink to the bottom.
  var list = rawList.slice().sort(function(a, b) {
    var av = viewsNumber(((a && a.topPost) || {}).views);
    var bv = viewsNumber(((b && b.topPost) || {}).views);
    return bv - av;
  });
  var h = renderHero('ifollow');
  if (!list.length) {
    h += '<div class="empty-msg">No follows configured yet.</div>';
  } else {
    h += '<div class="ifollow-list">';
    list.forEach(function(f) {
      var v = honestyParse(f.honesty);
      var profileUrl = 'https://x.com/' + (f.handle || '').replace(/^@/, '');

      // Display name: prefer the readable name out of "Name: blurb" justification,
      //               fallback to handle-without-@. NO leading @ ever.
      var rawJust = (f.justification || '').trim();
      var displayName, justBody;
      var colonIdx = rawJust.indexOf(':');
      if (colonIdx > 0 && colonIdx <= 40) {
        displayName = rawJust.slice(0, colonIdx).trim();
        justBody = rawJust.slice(colonIdx + 1).trim();
      } else {
        displayName = (f.handle || '?').replace(/^@/, '');
        justBody = rawJust;
      }

      // topPost (optional): { url, views, time, text }
      var tp = f.topPost || f.top_post || null;
      var topEmbed = '';
      var metaBits = [];
      if (tp) {
        if (tp.views) metaBits.push('<span class="views">' + esc(tp.views) + ' views</span>');
        var topAgo = timeAgo(tp.time, tp.url);
        if (topAgo) metaBits.push(topAgo);
        if (tp.url) topEmbed = renderEmbedSlot(tp.url);
      }
      // Honesty score IS the link to its note (blue underlined) when a
      // note exists; plain text otherwise. Same pattern as every other tab.
      var ifNid = honestyNid();
      var ifHonestyBit = honestyMetaPiece(f.honesty, f.note, ifNid);
      if (ifHonestyBit) metaBits.push(ifHonestyBit);
      // Expand-toggle □ at the end so the row reads identical to Main:
      //   1.6M views · 17h ago · 8/10 · □
      metaBits.push(metaExpandToggle());
      var metaLine = '';
      if (metaBits.length) {
        metaLine = '<div class="ifollow-meta">' + metaBits.join(' · ') + '</div>';
      }
      // Hidden note body — revealed by clicking the score. No standalone
      // ▼ notes line anymore. Renders nothing when there's no note.
      var noteFold = honestyNoteBody(f.note, ifNid);

      var sid = 'if' + Math.random().toString(36).substr(2, 9);
      // Cards with a top-post URL get an expandable accordion (embed loads on open).
      // Cards without stay flat.
      var wrapStart = topEmbed
        ? '<div class="ifollow-card story" id="' + sid + '">' +
            '<div class="story-header" onclick="toggleStory(\'' + sid + '\');" style="padding:0;background:transparent;">' +
              '<span class="arrow" style="margin-top:4px;">▶</span>' +
              '<span style="flex:1;">'
        : '<div class="ifollow-card">';
      var wrapEnd = topEmbed
        ? '</span></div><div class="story-body" style="padding-top:10px;border-top:1px solid #ede4cf;">' + topEmbed + '</div></div>'
        : '</div>';
      h += wrapStart +
             '<div class="ifollow-name"><a href="' + esc(profileUrl) + '" target="_blank" rel="noopener" onclick="event.stopPropagation();">' + esc(displayName) + '</a></div>' +
             (justBody ? '<div class="ifollow-just">' + esc(justBody) + '</div>' : '') +
             metaLine +
             noteFold +
           wrapEnd;
    });
    h += '</div>';
  }

  // Submission form
  h += '<div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:#f0e6d6; font-weight:700; margin:24px 0 8px;">Suggest someone</div>';
  h += '<form class="submit-form" id="ifollowForm" name="ifollow-suggest" method="POST" data-netlify="true" netlify-honeypot="bot-field" onsubmit="handleIFollowSubmit(event)">' +
         '<input type="hidden" name="form-name" value="ifollow-suggest" />' +
         '<p style="display:none;"><label>Don\'t fill: <input name="bot-field" /></label></p>' +
         '<label for="ifH">X handle</label>' +
         '<input type="text" id="ifH" name="handle" placeholder="@someone (or https://x.com/someone)" required />' +
         '<label for="ifJ">Why they should be followed</label>' +
         '<textarea id="ifJ" name="justification" rows="3" placeholder="One or two lines on what perspective this account adds (left/right/independent/expert)..."></textarea>' +
         '<button type="submit">Suggest handle</button>' +
         '<div id="ifMsg" style="display:none; margin-top:10px; padding:8px 12px; background:#e8f5e9; border-radius:5px; color:#2e7d32; font-size:0.85rem; font-weight:500;"></div>' +
       '</form>';
  return h;
}

function renderFreeItem(item) {
  var sid = 'fr' + Math.random().toString(36).substr(2, 9);
  var url = item.url || '';
  var headline = esc(item.headline || item.text || '(no headline)');
  var hdrAgo = timeAgo(item.time, url);
  // Inline meta row matching Main: VIEWS · AGE · 8/10 · □
  // The 8/10 is the blue underlined link to the note when one exists.
  var freeNid = honestyNid();
  var freeHonestyBit = honestyMetaPiece(item.honesty, item.note, freeNid);
  var meta = '<span class="post-meta">' +
    (item.views ? '<span class="views">' + esc(item.views) + ' views</span>' : '') +
    (hdrAgo ? ' · ' + hdrAgo : '') +
    (freeHonestyBit ? ' · ' + freeHonestyBit : '') +
    ' · ' + metaExpandToggle() +
    '</span>';
  // Parent post first (when this is a reply). Free Speech often quotes
  // a thread; without the parent, the reaction loses meaning.
  var parentHtml = renderParentPost(item.parentPost || item.parent_post);
  var sourceTile = renderSourceTile({ text: item.text, views: item.views, time: item.time, url: url });
  var freeNoteBody = honestyNoteBody(item.note, freeNid);
  return (
    '<div class="story" id="' + sid + '">' +
      '<div class="story-header" onclick="toggleStory(\'' + sid + '\');">' +
        '<span class="arrow">▶</span>' +
        '<span class="story-headline-text">' + headline + meta + '</span>' +
      '</div>' +
      freeNoteBody +
      '<div class="story-body">' + parentHtml + sourceTile + '</div>' +
    '</div>'
  );
}

function renderTabFree() {
  var free = (NEWS_DATA && NEWS_DATA.free) || [];
  var h = renderHero('free');
  if (!free.length) {
    h += '<div class="empty-msg">Nothing yet today.</div>';
    return h;
  }
  // Every entry — including Marc — renders through the same block.
  // No "ALWAYS FIRST" badge, no special card frame, no "Open Marc's post"
  // wrapper. The accumulator already sorts isMarc:true entries to the top
  // of free[], so order is preserved without special-casing the render.
  // Wrapped in narrow-list so blocks are 2-up like Elon, not full width.
  h += '<div class="narrow-list">' + free.map(renderFreeItem).join('') + '</div>';
  return h;
}

// Earlier tab — W/N/B stories that rotated off in a later cron but are
// still <24h fresh. Each entry renders through renderFreeItem so the
// block looks identical to every other tab (views · age · 8/10 · □).
// Grok ships entries in a FLAT shape (headline/url/views/time/honesty/
// note at the top level). If a `main` object is provided per the README
// nested shape, we normalize to the flat shape before rendering so both
// inputs produce the same output.
function normalizeEarlier(item) {
  var mp = item.main || item.main_post || {};
  // Top-level wins; fall back to main.* when missing. Honesty + note
  // are story-level on Earlier (no perspectives).
  return {
    headline: item.headline,
    text: item.text || mp.text,
    url: item.url || mp.url,
    views: item.views || mp.views,
    time: item.time || mp.time,
    honesty: item.honesty || mp.honesty,
    note: item.note || mp.note
  };
}
function renderTabEarlier() {
  var list = (NEWS_DATA && NEWS_DATA.earlier) || [];
  var h = renderHero('earlier');
  if (!list.length) {
    h += '<div class="empty-msg">Nothing has rotated off the front page yet this cycle. Earlier stories will show up here when the next hourly cron replaces them.</div>';
    return h;
  }
  // Group by category so the user can scan World / Nation / Business
  // separately within Earlier. If category is missing, fall back to World
  // (most common default).
  var byCat = { World: [], Nation: [], Business: [] };
  list.forEach(function(item) {
    var c = (item && item.category) || 'World';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(item);
  });
  ['World', 'Nation', 'Business'].forEach(function(cat) {
    var items = byCat[cat] || [];
    if (!items.length) return;
    h += '<div class="earlier-section">' +
           '<div class="col-title">' + esc(cat) + ' — earlier</div>' +
           '<div class="earlier-list">';
    items.forEach(function(item) {
      // Render through renderFreeItem so the block matches every other
      // tab exactly: ▶ headline / views · age · 8/10 · □ + ▼ notes.
      h += renderFreeItem(normalizeEarlier(item));
    });
    h += '</div></div>';
  });
  return h;
}

// MSM tab — stories legacy outlets won't touch
function renderTabMSM() {
  var msm = (NEWS_DATA && NEWS_DATA.msm) || [];
  var h = renderHero('msm');
  if (!msm.length) {
    h += '<div class="empty-msg" style="border-left: 4px solid #c0392b; padding: 14px 18px; background: rgba(192,57,43,0.12); border-radius: 6px;">' +
           '<strong style="color:#fff8ee;">Nothing flagged yet this cycle.</strong><br/>' +
           '<span style="color:#f0e6d6;font-size:0.85rem;">When Grok identifies high-velocity X stories that MSM is ignoring (Henry-Nowak-style cases), they appear here. Updated each cron.</span>' +
         '</div>';
    return h;
  }
  // MSM items reuse the story-block renderer; schema like main but flat
  // array. Wrapped in narrow-list so blocks are 2-up like Elon/Free.
  h += '<div class="narrow-list">' + msm.map(renderStoryBlock).join('') + '</div>';
  return h;
}

function renderContent() {
  var el = document.getElementById('content');
  var html = '';
  if      (activeTab === 'main')    html = renderTabMain();
  else if (activeTab === 'elon')    html = renderTabElon();
  else if (activeTab === 'sports')  html = renderTabSports();
  else if (activeTab === 'ifollow') html = renderTabIFollow();
  else if (activeTab === 'free')    html = renderTabFree();
  else if (activeTab === 'msm')     html = renderTabMSM();
  else if (activeTab === 'earlier') html = renderTabEarlier();
  // Last-updated footer
  if (NEWS_DATA && NEWS_DATA.last_updated) {
    var ts = new Date(NEWS_DATA.last_updated);
    if (!isNaN(ts.getTime())) {
      html += '<div style="text-align:center; color:#f0e6d6; font-size:0.76rem; margin-top:24px;">Last updated: ' +
              ts.toLocaleString([], { dateStyle: 'short', timeStyle: 'short' }) + '</div>';
    }
  }
  el.innerHTML = html;
}

function renderNav() {
  document.querySelectorAll('#nav a').forEach(function(a) {
    a.classList.toggle('active', a.dataset.tab === activeTab);
    a.onclick = function() { activeTab = a.dataset.tab; renderNav(); renderContent(); window.scrollTo(0, 0); };
  });
}

function updateFreshness() {
  var b = document.getElementById('freshnessBadge');
  if (!b) return;
  if (!NEWS_DATA || !NEWS_DATA.last_updated) { b.textContent = 'no data'; return; }
  var diffMin = Math.floor((Date.now() - new Date(NEWS_DATA.last_updated).getTime()) / 60000);
  if (diffMin < 0) diffMin = 0;
  if (diffMin < 60) b.textContent = diffMin + 'm ago · tap to refresh';
  else b.textContent = Math.floor(diffMin / 60) + 'h ago · tap to refresh';
}

function hardRefresh() {
  var u = new URL(window.location.href);
  u.searchParams.set('_r', Date.now());
  window.location.replace(u.toString());
}

// iFollow submission — Netlify Forms
function handleIFollowSubmit(e) {
  e.preventDefault();
  var handle = (document.getElementById('ifH').value || '').trim();
  var just = (document.getElementById('ifJ').value || '').trim();
  if (!handle) return;
  var msg = document.getElementById('ifMsg');
  fetch('/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      'form-name': 'ifollow-suggest',
      'bot-field': '',
      'handle': handle,
      'justification': just
    }).toString()
  }).then(function(r) {
    if (msg) {
      msg.style.display = 'block';
      msg.textContent = r.ok ? ('Suggested ' + handle + '. The owner reviews suggestions for the next pool reshuffle.') : ('Submission failed: HTTP ' + r.status);
    }
  }).catch(function(err) {
    if (msg) { msg.style.display = 'block'; msg.textContent = 'Submission error: ' + err; }
  });
  document.getElementById('ifollowForm').reset();
}

function loadData() {
  fetch('data/stories.json?_=' + Date.now())
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) {
      NEWS_DATA = d || { last_updated: null };
      document.getElementById('currentDate').textContent = formatDate();
      updateFreshness();
      renderNav();
      renderContent();
    })
    .catch(function() {
      document.getElementById('content').innerHTML = '<div class="empty-msg">Could not load stories. Make sure <code>data/stories.json</code> exists.</div>';
    });
}

window.addEventListener('DOMContentLoaded', loadData);
</script>
