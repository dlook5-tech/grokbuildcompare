name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs if a newer commit lands
concurrency:
  group: deploy-grokbuildcompare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy site to Netlify (digest API)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -eu
          # Build the file manifest (recursive, skipping dotfiles + node_modules)
          FILES_JSON=$(python3 <<'PY'
          import hashlib, json, os
          manifest = {}
          paths_by_hash = {}
          for dirpath, dirnames, filenames in os.walk('.'):
              dirnames[:] = [d for d in dirnames if not d.startswith('.') and d != 'node_modules']
              for fname in filenames:
                  if fname.startswith('.') or fname == '.DS_Store':
                      continue
                  full = os.path.join(dirpath, fname)
                  rel = '/' + os.path.relpath(full, '.').replace(os.sep, '/')
                  h = hashlib.sha1(open(full,'rb').read()).hexdigest()
                  manifest[rel] = h
                  paths_by_hash[h] = full
          json.dump(paths_by_hash, open('/tmp/paths.json','w'))
          print(json.dumps({'files': manifest}))
          PY
          )
          echo "$FILES_JSON" > /tmp/manifest.json

          # Create a digest deploy
          DEPLOY_RESP=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            -d @/tmp/manifest.json \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID/deploys")
          echo "$DEPLOY_RESP" > /tmp/deploy.json
          DEPLOY_ID=$(python3 -c "import json; print(json.load(open('/tmp/deploy.json'))['id'])")
          REQ=$(python3 -c "import json; print(len(json.load(open('/tmp/deploy.json')).get('required',[])))")
          echo "deploy_id=$DEPLOY_ID uploading $REQ files"

          if [ "$REQ" -gt 0 ]; then
            python3 <<'PY'
          import json, os, subprocess, sys
          resp = json.load(open('/tmp/deploy.json'))
          paths = json.load(open('/tmp/paths.json'))
          token = os.environ['NETLIFY_AUTH_TOKEN']
          for sha in resp.get('required', []):
              p = paths.get(sha)
              if not p: continue
              r = subprocess.run([
                'curl','-s','-X','PUT',
                '-H','Content-Type: application/octet-stream',
                '-H', f'Authorization: Bearer {token}',
                '--data-binary', f'@{p}',
                f'https://api.netlify.com/api/v1/deploys/{resp["id"]}/files/{sha}'
              ], capture_output=True, text=True)
              if r.returncode != 0:
                  print(f'upload failed: {p}: {r.stderr}', file=sys.stderr); sys.exit(1)
              print(f'uploaded {p}')
          PY
          fi

          sleep 2
          STATE=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/deploys/$DEPLOY_ID" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('state','?'))")
          echo "deploy state: $STATE"
          [ "$STATE" = "ready" ] || exit 1
